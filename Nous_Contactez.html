<!DOCTYPE html>

<body>

        <header class="text-center py-3">
            <h1 class="m-0">MOVA Entreprise</h1>
        </header>

        <div class="container text-center mt-5">
            <div class="row align-items-start">
                <div class="col">
                    <a href="file:///E:/Cours/BTS_SIO_1%C3%A8re_Ann%C3%A9e/Ateliers_Professionels/movapartie2/Accueil.html" class="btn section-btn btn-menu">Accueil</a>
                    <a href="file:///E:/Cours/BTS_SIO_1%C3%A8re_Ann%C3%A9e/Ateliers_Professionels/movapartie2/Charte_Graphique.html" class="btn section-btn btn-menu">Charte Graphique</a>
                    <a href="file:///E:/Cours/BTS_SIO_1%C3%A8re_Ann%C3%A9e/Ateliers_Professionels/movapartie2/Nos_Offres.html" class="btn section-btn btn-menu">Nos Offres</a>
                </div>
                <div class="col">
                    <a href="file:///E:/Cours/BTS_SIO_1%C3%A8re_Ann%C3%A9e/Ateliers_Professionels/movapartie2/Politique%20de%20confidentialit%C3%A9.html" class="btn section-btn btn-menu">Politique de Confidentialité</a>
                    <a href="file:///E:/Cours/BTS_SIO_1%C3%A8re_Ann%C3%A9e/Ateliers_Professionels/movapartie2/Conditions%20d'utilisations.html" class="btn section-btn btn-menu">Conditions d'Utilisation</a>
                    <a href="file:///E:/Cours/BTS_SIO_1%C3%A8re_Ann%C3%A9e/Ateliers_Professionels/movapartie2/Nous_Contactez.html" class="btn section-btn btn-menu">Contactez-Nous</a>
                    </div>
                    
                </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6">
                <form>
                    <fieldset class="border p-4 mb-4">
                        <legend class="fw-bold">Client</legend>
                        <div class="mb-3">
                            <label for="nom" class="form-label">Nom et prénom :</label>
                            <input type="text" id="nom" name="nom" class="form-control" placeholder="Nom et prénom">
                        </div>
                        <div class="mb-3">
                            <label for="adresse" class="form-label">Adresse :</label>
                            <input type="text" id="adresse" name="adresse" class="form-control" placeholder="Adresse">
                        </div>
                        <div class="mb-3">
                            <label for="adresse_mail" class="form-label">Adresse Mail :</label>
                            <input type="text" id="adresse_mail" name="adresse_mail" class="form-control" value="adresse_mail" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="code_postal" class="form-label">Code Postal :</label>
                            <input type="number" id="code_postal" name="code_postal" class="form-control" placeholder="Code Postal">
                        </div>
                        <div class="mb-3">
                            <label for="Ville" class="form-label">Ville :</label>
                            <input type="text" id="Ville" name="Ville" class="form-control" value="Ville" readonly>
                        </div>
                        
                </form>
            </div>
        </div>
    </div>
